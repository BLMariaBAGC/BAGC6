<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pomodoro Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #01293A;
      --teal: #3D858C;
      --turq: #C9F6FA;
      --bg: #f5f5f3;
      --surface: #ffffff;
      --surface2: #f0efeb;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --text: #111;
      --text2: #555;
      --text3: #888;
      --ring-bg: #e0e0e0;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e1a1f;
        --surface: #162028;
        --surface2: #1e2d35;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.2);
        --text: #f0f0f0;
        --text2: #aab;
        --text3: #778;
        --ring-bg: #2a3a3e;
      }
    }

    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 0;
      margin: 0;
    }

    .card {
      background: var(--surface);
      border: none;
      border-radius: 0;
      padding: 1rem 1rem 1.25rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
    }

    .top-bar {
      width: 100%;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .top-bar-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .sound-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      border: 1.5px solid var(--border2);
      border-radius: 20px;
      padding: 4px 10px;
      background: var(--surface);
      transition: background 0.2s;
      color: var(--text2);
    }

    .sound-toggle:hover { background: var(--surface2); }
    .sound-toggle.muted { opacity: 0.55; }

    .sound-toggle span {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      width: 100%;
    }

    .mode-btn {
      padding: 10px 4px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border2);
      background: var(--surface);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text2);
      transition: all 0.2s;
      text-align: center;
      line-height: 1.3;
    }

    .mode-btn .btn-mins {
      display: block;
      font-size: 11px;
      font-weight: 400;
      opacity: 0.65;
      margin-top: 2px;
    }

    .mode-btn.active {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
    }

    .mode-btn.active .btn-mins { opacity: 0.8; }

    .ring-wrap {
      position: relative;
      width: 180px;
      height: 180px;
    }

    .ring-wrap svg { transform: rotate(-90deg); }

    .ring-bg { fill: none; stroke: var(--ring-bg); stroke-width: 10; }

    .ring-prog {
      fill: none;
      stroke: var(--teal);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.9s linear, stroke 0.4s;
    }

    .ring-prog.break  { stroke: #5abf9c; }
    .ring-prog.longbreak { stroke: #7ba8ae; }

    .timer-display {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }

    .timer-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .timer-time {
      font-size: 40px;
      font-weight: 500;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      font-family: Georgia, "Times New Roman", serif;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .ctrl-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      color: var(--text2);
    }

    .ctrl-btn:hover { background: var(--surface2); border-color: var(--border); }
    .ctrl-btn svg { pointer-events: none; }

    .ctrl-btn.primary {
      width: 64px; height: 64px;
      background: var(--navy);
      border-color: var(--navy);
    }

    .ctrl-btn.primary:hover { background: #023550; }

    .sessions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .session-dots { display: flex; gap: 8px; }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--ring-bg);
      transition: background 0.3s;
    }

    .dot.done { background: var(--teal); }

    .session-label {
      font-size: 12px;
      color: var(--text3);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-badge {
      font-size: 12px;
      padding: 4px 14px;
      border-radius: 12px;
      background: var(--surface2);
      color: var(--text2);
      border: 0.5px solid var(--border);
    }

    .brand-header {
      width: 100%;
      background: #3D858C;
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      mix-blend-mode: multiply;
      background: #3D858C;
    }

    .brand-text { display: flex; flex-direction: column; gap: 2px; }

    .brand-title {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.2px;
      line-height: 1.2;
      font-family: Georgia, serif;
    }

    .brand-tagline {
      font-size: 11px;
      color: rgba(255,255,255,0.78);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
  </style>
</head>

  <script>
    const MODES = {
      work:     { label: "Focus",          mins: 25, ring: ""          },
      short:    { label: "Short break",    mins: 5,  ring: " break"    },
      long:     { label: "Long break",     mins: 15, ring: " break"    },
      extended: { label: "Extended break", mins: 45, ring: " longbreak"}
    };

    const CIRC = 471.2;
    let mode = "work", totalSecs = 25 * 60, remSecs = 25 * 60;
    let running = false, timerRef = null, sessions = 0, muted = false;
    let audioCtx = null, tickPhase = 0;

    const display      = document.getElementById("display");
    const ring         = document.getElementById("ring");
    const modeLabel    = document.getElementById("mode-label");
    const playBtn      = document.getElementById("play-btn");
    const playIcon     = document.getElementById("play-icon");
    const dotsEl       = document.getElementById("dots");
    const sessionLabel = document.getElementById("session-label");
    const statusBadge  = document.getElementById("status-badge");
    const soundBtn     = document.getElementById("sound-btn");
    const soundLabel   = document.getElementById("sound-label");
    const soundIcon    = document.getElementById("sound-icon");

    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playTick(phase) {
      if (muted) return;
      try {
        const ctx = getCtx();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
        const data = buf.getChannelData(0);
        const freq = phase === 0 ? 1200 : 900;
        for (let i = 0; i < data.length; i++) {
          const t = i / ctx.sampleRate;
          data[i] = Math.sin(2 * Math.PI * freq * t) * Math.exp(-t * 80) * 0.35;
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start();
      } catch (e) {}
    }

    function playBell() {
      if (muted) return;
      try {
        const ctx = getCtx();
        [660, 880, 1100].forEach((f, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = "sine"; o.frequency.value = f;
          const t = ctx.currentTime + i * 0.18;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.25, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
          o.start(t); o.stop(t + 1.2);
        });
      } catch (e) {}
    }

    function fmt(s) {
      const m = Math.floor(s / 60), sec = s % 60;
      return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    }

    function renderDots() {
      dotsEl.innerHTML = "";
      for (let i = 0; i < 4; i++) {
        const d = document.createElement("div");
        d.className = "dot" + (i < sessions % 4 ? " done" : "");
        dotsEl.appendChild(d);
      }
    }

    function setDisplay() {
      display.textContent = fmt(remSecs);
      ring.style.strokeDashoffset = CIRC * (1 - remSecs / totalSecs);
      ring.className = "ring-prog" + MODES[mode].ring;
    }

    function setMode(m) {
      mode = m; running = false; clearInterval(timerRef); tickPhase = 0;
      totalSecs = MODES[m].mins * 60; remSecs = totalSecs;
      modeLabel.textContent = MODES[m].label;
      document.querySelectorAll(".mode-btn").forEach(b =>
        b.classList.toggle("active", b.dataset.mode === m)
      );
      setPlayIcon(false); setDisplay();
      statusBadge.textContent = "Ready to " + MODES[m].label.toLowerCase();
    }

    function setPlayIcon(p) {
      playIcon.innerHTML = p
        ? '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
        : '<polygon points="6,4 20,12 6,20"/>';
    }

    function updateSoundUI() {
      soundBtn.classList.toggle("muted", muted);
      soundLabel.textContent = muted ? "Sound off" : "Sound on";
      soundIcon.innerHTML = muted
        ? '<polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>'
        : '<polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>';
    }

    soundBtn.addEventListener("click", () => {
      muted = !muted;
      updateSoundUI();
      if (!muted) getCtx();
    });

    playBtn.addEventListener("click", () => {
      running = !running;
      setPlayIcon(running);
      if (running) {
        if (!muted) getCtx();
        statusBadge.textContent = mode === "work" ? "Focusing..." : "Resting...";
        timerRef = setInterval(() => {
          playTick(tickPhase);
          tickPhase = tickPhase === 0 ? 1 : 0;
          remSecs--; setDisplay();
          if (remSecs <= 0) {
            clearInterval(timerRef); running = false; setPlayIcon(false); tickPhase = 0;
            playBell();
            if (mode === "work") {
              sessions++;
              renderDots();
              const s = sessions % 4;
              sessionLabel.textContent = `Session ${s === 0 ? 4 : s} of 4`;
            }
            statusBadge.textContent = mode === "work" ? "Time for a break!" : "Back to focusing!";
            setMode(mode === "work" ? (sessions % 4 === 0 ? "long" : "short") : "work");
          }
        }, 1000);
      } else {
        clearInterval(timerRef);
        statusBadge.textContent = "Paused";
      }
    });

    document.getElementById("reset-btn").addEventListener("click", () => {
      clearInterval(timerRef); running = false; remSecs = totalSecs; tickPhase = 0;
      setPlayIcon(false); setDisplay();
      statusBadge.textContent = "Ready to " + MODES[mode].label.toLowerCase();
    });

    document.getElementById("skip-btn").addEventListener("click", () => {
      clearInterval(timerRef); running = false; tickPhase = 0; setPlayIcon(false);
      if (mode === "work") {
        sessions++;
        renderDots();
        const s = sessions % 4;
        sessionLabel.textContent = `Session ${s === 0 ? 4 : s} of 4`;
      }
      setMode(mode === "work" ? (sessions % 4 === 0 ? "long" : "short") : "work");
    });

    document.querySelectorAll(".mode-btn").forEach(b =>
      b.addEventListener("click", () => setMode(b.dataset.mode))
    );

    renderDots();
    setDisplay();

    function sendHeight() {
      const h = document.body.scrollHeight;
      window.parent.postMessage({ type: "pomodoroHeight", height: h }, "*");
    }
    new ResizeObserver(sendHeight).observe(document.body);
    sendHeight();
  </script>
</body>
</html>
