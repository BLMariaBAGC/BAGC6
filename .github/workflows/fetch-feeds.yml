name: Fetch RSS Feeds

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch all RSS feeds
        run: python3 .github/workflows/fetch_feeds.py

      - name: Commit feeds.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds.json
          git diff --cached --quiet || git commit -m "chore: refresh RSS feeds"
          git push
