<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyond Limits · The Café</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--a:#c9a44e;--al:#e8c87a;--navy:#01293A;--w:rgba(255,255,255,.9);--wd:rgba(255,255,255,.45);--wf:rgba(255,255,255,.08)}
body{background:transparent;font-family:"Lato",sans-serif;padding:0}
.pw{width:100%;max-width:520px;background:linear-gradient(160deg,#02201a,#01293A 60%);border:1px solid rgba(201,164,78,.2);border-radius:6px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5)}

/* ── COLLAPSED BAR ── */
.bar{display:flex;align-items:center;gap:12px;padding:0 16px;height:64px;cursor:default;position:relative}
.bar::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--a),var(--al),var(--a),transparent);opacity:.6}
.vsmall{flex-shrink:0;width:36px;height:36px;position:relative}
.vdisk{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 50%,#0a0a0a 0%,#0a0a0a 20%,#1c1c1c 20%,#1c1c1c 26%,#111 26%,#111 32%,#1c1c1c 32%,#1c1c1c 38%,#111 38%,#111 44%,#1c1c1c 44%,#1c1c1c 50%);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.vdisk::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:var(--a)}
.vdisk.spin{animation:spin 4s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.binfo{flex:1;min-width:0}
.btitle{font-family:"Cormorant Garamond",serif;font-size:13px;font-weight:400;color:var(--w);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.bsub{font-size:10px;font-weight:300;color:var(--wd);letter-spacing:.05em;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ibtn{background:none;border:none;cursor:pointer;color:var(--wd);display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;transition:color .15s,transform .1s}
.ibtn:hover{color:var(--al);transform:scale(1.1)}
.ibtn:active{transform:scale(.92)}
.playbtn{width:38px;height:38px;background:linear-gradient(135deg,var(--a),color-mix(in srgb,var(--a) 60%,#000));color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.playbtn:hover{color:#fff;transform:scale(1.08)}
.chevbtn{color:rgba(255,255,255,.3)}
.chevbtn:hover{color:var(--al)}
.chevbtn svg{transition:transform .3s ease}
.chevbtn.open svg{transform:rotate(180deg)}

/* ── EXPANDED PANEL ── */
.panel{max-height:0;overflow:hidden;transition:max-height .35s ease}
.panel.open{max-height:600px}
.pdivider{height:1px;background:var(--wf);margin:0 16px}

/* progress */
.prog{padding:14px 16px 8px}
.pbo{height:3px;background:var(--wf);border-radius:2px;cursor:pointer;margin-bottom:6px;overflow:hidden}
.pbi{height:100%;background:linear-gradient(90deg,var(--a),var(--al));border-radius:2px;width:0%;transition:width .5s linear}
.trow{display:flex;justify-content:space-between;font-size:10px;font-weight:300;color:var(--wd);letter-spacing:.04em}

/* playlist header */
.plhead{padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between}
.plabel{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--a);font-weight:300}
.autotag{font-size:9px;letter-spacing:.1em;color:var(--a);opacity:.7;font-weight:300}

/* track rows */
.titem{display:flex;align-items:center;padding:8px 16px;cursor:pointer;transition:background .12s;gap:10px;border-left:2px solid transparent}
.titem:hover{background:rgba(255,255,255,.04)}
.titem.on{background:rgba(0,0,0,.15);border-left-color:var(--a)}
.tnum{font-size:10px;color:var(--wd);width:16px;flex-shrink:0;font-weight:300;font-variant-numeric:tabular-nums}
.titem.on .tnum{color:var(--a)}
.tdet{flex:1;min-width:0}
.tname{font-family:"Cormorant Garamond",serif;font-size:14px;color:var(--w);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tartist{font-size:10px;color:var(--wd);font-weight:300;margin-top:1px}
.tdur{font-size:10px;color:var(--wd);font-weight:300;font-variant-numeric:tabular-nums}

/* footer */
.pf{padding:10px 16px;border-top:1px solid var(--wf);font-size:9px;color:rgba(255,255,255,.18);font-weight:300;letter-spacing:.05em;display:flex;justify-content:space-between}

/* bars */
.bars{display:flex;gap:2px;align-items:flex-end;height:12px;flex-shrink:0}
.bbar{width:2px;background:var(--a);border-radius:1px;height:3px}
.bars.on .bbar:nth-child(1){animation:b1 .8s ease-in-out infinite}
.bars.on .bbar:nth-child(2){animation:b2 .6s ease-in-out infinite}
.bars.on .bbar:nth-child(3){animation:b3 .9s ease-in-out infinite}
@keyframes b1{0%,100%{height:3px}50%{height:12px}}
@keyframes b2{0%,100%{height:8px}50%{height:3px}}
@keyframes b3{0%,100%{height:5px}50%{height:10px}}
</style>
</head>
<body>
<div class="pw">

  <!-- COLLAPSED BAR -->
  <div class="bar">
    <div class="vsmall"><div class="vdisk" id="vd"></div></div>
    <div class="binfo">
      <div class="btitle" id="bTn">Kater Street Rag</div>
      <div class="bsub">The Café &middot; <span id="bAr">Bennie Moten</span></div>
    </div>
    <div class="bars" id="bars"><div class="bbar"></div><div class="bbar"></div><div class="bbar"></div></div>
    <div class="bctrl">
      <button class="ibtn" onclick="prev()" title="Previous">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
      </button>
      <button class="ibtn playbtn" onclick="tog()" title="Play/Pause">
        <svg id="ip" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="ipa" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="ibtn" onclick="next()" title="Next">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
      <button class="ibtn chevbtn" id="chev" onclick="togglePanel()" title="Expand">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
  </div>

  <!-- EXPANDED PANEL -->
  <div class="panel" id="panel">
    <div class="pdivider"></div>
    <div class="prog">
      <div class="pbo" id="pbo"><div class="pbi" id="pbi"></div></div>
      <div class="trow"><span id="tC">0:00</span><span id="tD">--:--</span></div>
    </div>
    <div class="plhead">
      <span class="plabel">Playlist</span>
      <span class="autotag">&#9654; Auto-advance on</span>
    </div>
    <div id="tlist"></div>
    <div class="pf"><span>All recordings public domain</span><span>&copy; Hypnotika Mente Ltd 2026</span></div>
  </div>

</div>
<audio id="au"></audio>
<script>
const B='https://archive.org/download/Free_20s_Jazz_Collection/';
const T=[
  {n:'Kater Street Rag',a:'Bennie Moten',y:'1923',f:'Bennie_Moten_Kater_St._Rag_64kb.mp3'},
  {n:'Animal Crackers',a:'California Ramblers',y:'1923',f:'CA_Ramblers_Animal_Crackers_64kb.mp3'},
  {n:'Five Foot Two',a:'Golden Gate Orchestra',y:'1925',f:'Golden_Gate_Orch-5_Foot_2_11KHz_64kb.mp3'},
  {n:'Hot Mittens',a:'Bucktown Five',y:'1924',f:'Bucktown_5_Hot_Mittens_64kb.mp3'},
  {n:"Somebody's Wrong",a:'1920s Jazz Orchestra',y:'1923',f:'Somebodys_Wrong_64kb.mp3'},
  {n:'I Wanna Be Loved',a:'Broadway Nitelites',y:'1926',f:'Broadway_Nitelites_I_Wanna_Be_Loved_64kb.mp3'},
  {n:'Me And The Man In The Moon',a:'The Ambassadors',y:'1928',f:'Ambassadors_Me_And_The_Man_In_The_Moon_64kb.mp3'},
  {n:'Tishomingo Blues',a:'The Washingtonians',y:'1925',f:'Washingtonians-Tishomingo_Blues_11KHz_64kb.mp3'}
];
let c=0,pl=false,panOpen=false;
const au=document.getElementById('au');
function togglePanel(){
  panOpen=!panOpen;
  document.getElementById('panel').classList.toggle('open',panOpen);
  document.getElementById('chev').classList.toggle('open',panOpen);
}
function build(){
  const el=document.getElementById('tlist');el.innerHTML='';
  T.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='titem'+(i===c?' on':'');
    d.innerHTML=`<span class="tnum">${String(i+1).padStart(2,'0')}</span><div class="tdet"><div class="tname">${t.n}</div><div class="tartist">${t.a} &middot; ${t.y}</div></div><span class="tdur" id="d${i}"></span>`;
    d.onclick=()=>load(i,true);el.appendChild(d);
  });
}
function load(i,auto=false){
  c=i;const t=T[i];
  document.getElementById('bTn').textContent=t.n;
  document.getElementById('bAr').textContent=t.a;
  au.src=B+t.f;au.load();
  document.querySelectorAll('.titem').forEach((el,j)=>el.classList.toggle('on',j===c));
  if(auto){au.play();set(true);}else set(false);
}
function tog(){pl?au.pause():au.play();set(!pl);}
function set(p){
  pl=p;
  document.getElementById('ip').style.display=p?'none':'block';
  document.getElementById('ipa').style.display=p?'block':'none';
  document.getElementById('vd').classList.toggle('spin',p);
  document.getElementById('bars').classList.toggle('on',p);
}
function prev(){load((c-1+T.length)%T.length,pl);}
function next(){load((c+1)%T.length,pl);}
au.volume=0.75;
au.addEventListener('timeupdate',()=>{
  if(!au.duration)return;
  document.getElementById('pbi').style.width=(au.currentTime/au.duration*100)+'%';
  document.getElementById('tC').textContent=fmt(au.currentTime);
});
au.addEventListener('loadedmetadata',()=>{
  document.getElementById('tD').textContent=fmt(au.duration);
  const d=document.getElementById('d'+c);if(d)d.textContent=fmt(au.duration);
});
au.addEventListener('ended',next);
document.getElementById('pbo').addEventListener('click',function(e){
  const r=this.getBoundingClientRect();
  if(au.duration)au.currentTime=((e.clientX-r.left)/r.width)*au.duration;
});
function fmt(s){s=Math.floor(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
build();load(0);
</script>
</body>
</html>
